# Reference only — do not apply this file or commit a real secret.
# Create the actual secret via kubectl instead (see IMPLEMENTATION.md Stage F1):
#
#   kubectl create secret generic mongo-secret \
#     --from-literal=MONGODB_URI='mongodb+srv://<user>:<password>@<cluster>.mongodb.net/mern-blog?retryWrites=true&w=majority'
#
apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
type: Opaque
data:
  MONGODB_URI: <base64-encoded-connection-string>
