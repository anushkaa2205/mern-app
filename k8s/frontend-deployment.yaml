apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  # 1 replica: t3.micro nodes allow only 4 pods each (VPC CNI ENI limit),
  # and system DaemonSets consume most of that budget.
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 765465308888.dkr.ecr.ap-south-1.amazonaws.com/mern-blog-client:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
